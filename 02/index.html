<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>홍길동 — 자기소개</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    rel="stylesheet"
  />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #1e293b;
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.55) 0%, rgba(56, 189, 248, 0.25) 70%, rgba(56, 189, 248, 0) 100%);
      animation-name: floatDot;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
      will-change: transform, opacity;
    }

    @keyframes floatDot {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.35;
      }
      50% {
        opacity: 0.7;
      }
      100% {
        transform: translate3d(var(--dx, 20px), var(--dy, -30px), 0) scale(1.15);
        opacity: 0.4;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot {
        animation: none !important;
      }
      .card {
        transition: none !important;
      }
      .tag {
        transition: background-color 0.2s ease, color 0.2s ease,
          border-color 0.2s ease !important;
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 48px 36px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      box-shadow: 0 20px 50px -20px rgba(15, 23, 42, 0.15),
        0 8px 24px -12px rgba(14, 165, 233, 0.18);
      text-align: center;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 30px 60px -20px rgba(15, 23, 42, 0.2),
        0 12px 28px -10px rgba(14, 165, 233, 0.25);
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
      color: #ffffff;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      box-shadow: 0 10px 24px -8px rgba(14, 165, 233, 0.55);
    }

    .name {
      margin: 0 0 10px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #0f172a;
    }

    .bio {
      margin: 0 0 28px;
      font-size: 15px;
      line-height: 1.6;
      color: #475569;
    }

    .tags {
      list-style: none;
      margin: 0 0 32px;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .tags li {
      list-style: none;
    }

    .tag {
      display: inline-block;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #0369a1;
      background: rgba(14, 165, 233, 0.1);
      border: 1px solid rgba(14, 165, 233, 0.18);
      border-radius: 999px;
      transform: translateY(0);
      transition: background-color 0.25s ease, color 0.25s ease,
        border-color 0.25s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: default;
    }

    .tags li:nth-child(1) .tag { transition-delay: 0s, 0s, 0s, 0.05s; }
    .tags li:nth-child(2) .tag { transition-delay: 0s, 0s, 0s, 0.15s; }
    .tags li:nth-child(3) .tag { transition-delay: 0s, 0s, 0s, 0.25s; }
    .tags li:nth-child(4) .tag { transition-delay: 0s, 0s, 0s, 0.35s; }

    .card:hover .tag {
      transform: translateY(-6px);
    }

    .tag:hover {
      background: #0ea5e9;
      color: #ffffff;
      border-color: #0ea5e9;
    }

    .socials {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .social {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 12px;
      text-decoration: none;
      transition: background-color 0.2s ease, color 0.2s ease,
        border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .social:hover {
      background: #0ea5e9;
      color: #ffffff;
      border-color: #0ea5e9;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px -8px rgba(14, 165, 233, 0.55);
    }

    .social svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 22px;
        border-radius: 20px;
      }

      .avatar {
        width: 76px;
        height: 76px;
        font-size: 28px;
      }

      .name {
        font-size: 22px;
      }

      .bio {
        font-size: 14px;
      }

      .social {
        padding: 11px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="dots" aria-hidden="true"></div>
  <main class="card">
    <div class="avatar" aria-hidden="true">홍</div>
    <h1 class="name">홍길동</h1>
    <p class="bio">코드와 커피, 책과 산책을 좋아합니다</p>

    <ul class="tags" aria-label="관심 태그">
      <li><span class="tag">독서</span></li>
      <li><span class="tag">여행</span></li>
      <li><span class="tag">사진</span></li>
      <li><span class="tag">커피</span></li>
    </ul>

    <div class="socials">
      <a
        class="social"
        href="https://github.com/JinseongHwang"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub 프로필"
      >
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path
            d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.27-.01-1.01-.02-1.99-3.2.7-3.87-1.54-3.87-1.54-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.24 3.34.95.1-.74.4-1.24.72-1.53-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.18 1.18.92-.26 1.91-.39 2.89-.39.98 0 1.97.13 2.89.39 2.21-1.49 3.18-1.18 3.18-1.18.62 1.59.23 2.76.11 3.05.73.81 1.18 1.84 1.18 3.1 0 4.42-2.69 5.39-5.25 5.68.41.35.78 1.04.78 2.1 0 1.52-.01 2.74-.01 3.11 0 .31.21.68.8.56 4.56-1.53 7.85-5.83 7.85-10.91C23.5 5.65 18.35.5 12 .5z"
          />
        </svg>
        GitHub
      </a>
      <a
        class="social"
        href="https://linkedin.com/in/jinseong-hwang"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn 프로필"
      >
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path
            d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.36V9h3.41v1.56h.05c.47-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.21 0 22.23 0z"
          />
        </svg>
        LinkedIn
      </a>
    </div>
  </main>

  <script>
    (function () {
      var container = document.querySelector('.dots');
      if (!container) return;
      var COUNT = 30;
      var frag = document.createDocumentFragment();
      for (var i = 0; i < COUNT; i++) {
        var dot = document.createElement('span');
        dot.className = 'dot';
        var size = (Math.random() * 8 + 4).toFixed(2); // 4 ~ 12px
        var top = (Math.random() * 100).toFixed(2);
        var left = (Math.random() * 100).toFixed(2);
        var dx = (Math.random() * 80 - 40).toFixed(2); // -40 ~ 40px
        var dy = (Math.random() * 80 - 40).toFixed(2);
        var duration = (Math.random() * 8 + 6).toFixed(2); // 6 ~ 14s
        var delay = (Math.random() * -10).toFixed(2); // negative for staggered start
        dot.style.cssText =
          'width:' + size + 'px;' +
          'height:' + size + 'px;' +
          'top:' + top + '%;' +
          'left:' + left + '%;' +
          '--dx:' + dx + 'px;' +
          '--dy:' + dy + 'px;' +
          'animation-duration:' + duration + 's;' +
          'animation-delay:' + delay + 's;';
        frag.appendChild(dot);
      }
      container.appendChild(frag);
    })();
  </script>
</body>
</html>
